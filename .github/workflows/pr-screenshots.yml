name: PR Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: pr-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build (local TinaCMS, no cloud secrets needed)
        run: pnpm build-ci

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start server
        run: pnpm start-local &

      - name: Wait for server
        run: pnpm exec wait-on http://127.0.0.1:3002 --timeout 60000

      - name: Capture screenshots
        run: pnpm pr:screenshots
        env:
          BASE_URL: http://127.0.0.1:3002

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: pr-screenshots/

      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- pr-screenshots -->';

            const body = [
              marker,
              '## UI Preview (automated screenshots)',
              '',
              'Screenshots generated from a **local TinaCMS build** (no cloud secrets required).',
              '',
              `➡️ Open the workflow run: ${runUrl}`,
              'Then download the **pr-screenshots** artifact (includes an index.md for quick viewing).',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find((c) => (c.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
